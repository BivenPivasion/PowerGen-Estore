
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../static/css/log_reg.css">

    <title>Login page</title>
</head>
<body class="App">
<div class="auth-wrapper login-page">
    <div class="form-container">
        <div class="brand-logo">POWER<span>GEN</span></div>
        <h2>Вхід до системи</h2>
        
        {% if form.errors %}
            <div class="error-text">
                Ваші ім'я користувача та пароль не збігаються.
            </div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">Ім'я користувача</label>
                {{ form.username }}
            </div>
            
            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">Пароль</label>
                {{ form.password }}
            </div>
            
            <button type="submit" class="btn primary-btn">УВІЙТИ</button>
        </form>
        
        <p class="form-footer">Немає аккаунта? <a href="{% url 'register' %}">Зареєструватися</a></p>
    </div>
</div>
    
</body>
</html>
